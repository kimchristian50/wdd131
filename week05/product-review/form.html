<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" as="image" href="images/aba-nigeria-temple.jpg">
    <title>WDD 131 - Dynamic Web Fundamentals - Pam Christison</title>
    <meta name="description" content="Pam Christison | WDD 131 - Dynamic Web Fundamentals | Form with active content">
    <meta name="author" content="Pam Christison">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@349&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>

</head>

<body>
    <main>
        <h1>Product Review</h1>
        <form method="get" action="review.html" class="review-form">
            <fieldset>
                <label for="product">Product Name</label>
                <select name="product" id="product" required disabled>
                    <option value="" disabled selected>Select a Product...</option>
                </select>

                <div class="rating-container">
                    <span class="label">Overall Rating</span>
                    <div class="star-rating">
                        <input type="radio" name="stars" id="star-a" value="5" required>
                        <label for="star-a"></label>

                        <input type="radio" name="stars" id="star-b" value="4" required>
                        <label for="star-b"></label>

                        <input type="radio" name="stars" id="star-c" value="3" required>
                        <label for="star-c"></label>

                        <input type="radio" name="stars" id="star-d" value="2" required>
                        <label for="star-d"></label>

                        <input type="radio" name="stars" id="star-e" value="1" required>
                        <label for="star-e"></label>
                    </div>
                </div>

                <label for="installDate">Date of installation</label>
                <input type="date" id="installDate" name="installDate" required>
                <div class="feature-header">
                    <div>Which features did you find useful in the product?</div>
                    <div class="sub-text">(Check all that apply)</div>
                </div>
                <div id="checkbox-group">
                    <label for="durability"><input type="checkbox" name="durability" value="yes"
                            id="durability">Durability</label>
                    <label for="ease"><input type="checkbox" name="ease" value="yes" id="ease">Ease of Use</label>
                    <label for="performance"><input type="checkbox" name="performance" value="yes"
                            id="performance">Performance</label>
                    <label for="design"><input type="checkbox" name="design" value="yes" id="design">Design</label>
                </div>

                <label for="review">Written Review (Optional)</label>
                <textarea id="review" name="review" rows="5" cols="30"
                    placeholder="Write your comments here..."></textarea>
                <label for="name">Your Name (Optional)</label>
                <input type="text" id="name" name="name">
                <input type="submit" value="Post My Review">
            </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> ☀️ Pam Christison ☀️ New Mexico, USA</p>
        <p><span id="lastModified"></span></p>
    </footer>

</body>

</html>
